<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4A43CC"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="23.04" fill="url(#bg)"/>

  <!-- Inner highlight -->
  <rect x="19.2" y="19.2" width="89.6" height="70.4"
        rx="13.824" fill="url(#glow)" opacity="0.5"/>

  <!-- Eye symbol -->
  <g transform="translate(64.0,64.0)">
    <!-- Outer eye shape -->
    <ellipse rx="24.32" ry="15.2" fill="white" opacity="0.95"/>
    <!-- Iris -->
    <circle r="8.843636363636364" fill="#1A1733"/>
    <!-- Pupil highlight -->
    <circle cx="-2.7022222222222223" cy="-2.7022222222222223" r="3.474285714285714" fill="white" opacity="0.8"/>
    <!-- Eyelashes top -->
    <path d="M-12.16,-12.8 L-10.80888888888889,-22.109090909090906" stroke="white" stroke-width="2.304" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-15.2 L0,-24.32" stroke="white" stroke-width="2.304" stroke-linecap="round" opacity="0.7"/>
    <path d="M12.16,-12.8 L10.80888888888889,-22.109090909090906" stroke="white" stroke-width="2.304" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- App name text (small) -->
  <text x="64.0" y="108.8" text-anchor="middle"
        font-family="Cairo, Tajawal, Arial" font-weight="900"
        font-size="16.64" fill="white" opacity="0.9"
        letter-spacing="1.28">بصيرة</text>
</svg>