<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4A43CC"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="34.56" fill="url(#bg)"/>

  <!-- Inner highlight -->
  <rect x="28.799999999999997" y="28.799999999999997" width="134.4" height="105.60000000000001"
        rx="20.736" fill="url(#glow)" opacity="0.5"/>

  <!-- Eye symbol -->
  <g transform="translate(96.0,96.0)">
    <!-- Outer eye shape -->
    <ellipse rx="36.480000000000004" ry="22.8" fill="white" opacity="0.95"/>
    <!-- Iris -->
    <circle r="13.265454545454547" fill="#1A1733"/>
    <!-- Pupil highlight -->
    <circle cx="-4.053333333333334" cy="-4.053333333333334" r="5.211428571428572" fill="white" opacity="0.8"/>
    <!-- Eyelashes top -->
    <path d="M-18.240000000000002,-19.200000000000003 L-16.213333333333335,-33.163636363636364" stroke="white" stroke-width="3.4559999999999995" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-22.8 L0,-36.480000000000004" stroke="white" stroke-width="3.4559999999999995" stroke-linecap="round" opacity="0.7"/>
    <path d="M18.240000000000002,-19.200000000000003 L16.213333333333335,-33.163636363636364" stroke="white" stroke-width="3.4559999999999995" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- App name text (small) -->
  <text x="96.0" y="163.2" text-anchor="middle"
        font-family="Cairo, Tajawal, Arial" font-weight="900"
        font-size="24.96" fill="white" opacity="0.9"
        letter-spacing="1.92">بصيرة</text>
