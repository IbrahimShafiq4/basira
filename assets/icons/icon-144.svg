    <!-- Pupil highlight -->
    <circle cx="-3.04" cy="-3.04" r="3.9085714285714284" fill="white" opacity="0.8"/>
    <!-- Eyelashes top -->
    <path d="M-13.68,-14.4 L-12.16,-24.87272727272727" stroke="white" stroke-width="2.5919999999999996" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-17.099999999999998 L0,-27.36" stroke="white" stroke-width="2.5919999999999996" stroke-linecap="round" opacity="0.7"/>
    <path d="M13.68,-14.4 L12.16,-24.87272727272727" stroke="white" stroke-width="2.5919999999999996" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- App name text (small) -->
  <text x="72.0" y="122.39999999999999" text-anchor="middle"
