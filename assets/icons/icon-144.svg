  <!-- Inner highlight -->
  <rect x="21.599999999999998" y="21.599999999999998" width="100.80000000000001" height="79.2"
        rx="15.551999999999998" fill="url(#glow)" opacity="0.5"/>

  <!-- Eye symbol -->
