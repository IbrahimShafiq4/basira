<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4A43CC"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92.16" fill="url(#bg)"/>

  <!-- Inner highlight -->
  <rect x="76.8" y="76.8" width="358.4" height="281.6"
        rx="55.296" fill="url(#glow)" opacity="0.5"/>

  <!-- Eye symbol -->
  <g transform="translate(256.0,256.0)">
    <!-- Outer eye shape -->
    <ellipse rx="97.28" ry="60.8" fill="white" opacity="0.95"/>
    <!-- Iris -->
    <circle r="35.374545454545455" fill="#1A1733"/>
    <!-- Pupil highlight -->
    <circle cx="-10.80888888888889" cy="-10.80888888888889" r="13.897142857142857" fill="white" opacity="0.8"/>
    <!-- Eyelashes top -->
    <path d="M-48.64,-51.2 L-43.23555555555556,-88.43636363636362" stroke="white" stroke-width="9.216" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-60.8 L0,-97.28" stroke="white" stroke-width="9.216" stroke-linecap="round" opacity="0.7"/>
    <path d="M48.64,-51.2 L43.23555555555556,-88.43636363636362" stroke="white" stroke-width="9.216" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- App name text (small) -->
  <text x="256.0" y="435.2" text-anchor="middle"
        font-family="Cairo, Tajawal, Arial" font-weight="900"
        font-size="66.56" fill="white" opacity="0.9"
        letter-spacing="5.12">بصيرة</text>
</svg>