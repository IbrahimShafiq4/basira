    <!-- Outer eye shape -->
    <ellipse rx="13.68" ry="8.549999999999999" fill="white" opacity="0.95"/>
    <!-- Iris -->
    <circle r="4.974545454545455" fill="#1A1733"/>
    <!-- Pupil highlight -->
    <circle cx="-1.52" cy="-1.52" r="1.9542857142857142" fill="white" opacity="0.8"/>
    <!-- Eyelashes top -->
    <path d="M-6.84,-7.2 L-6.08,-12.436363636363636" stroke="white" stroke-width="1.2959999999999998" stroke-linecap="round" opacity="0.7"/>
    <path d="M0,-8.549999999999999 L0,-13.68" stroke="white" stroke-width="1.2959999999999998" stroke-linecap="round" opacity="0.7"/>
    <path d="M6.84,-7.2 L6.08,-12.436363636363636" stroke="white" stroke-width="1.2959999999999998" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- App name text (small) -->
  <text x="36.0" y="61.199999999999996" text-anchor="middle"
