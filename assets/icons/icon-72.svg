  <!-- Inner highlight -->
  <rect x="10.799999999999999" y="10.799999999999999" width="50.400000000000006" height="39.6"
        rx="7.775999999999999" fill="url(#glow)" opacity="0.5"/>

  <!-- Eye symbol -->
