    <path d="M0,-18.049999999999997 L0,-28.88" stroke="white" stroke-width="2.7359999999999998" stroke-linecap="round" opacity="0.7"/>
    <path d="M14.44,-15.200000000000001 L12.835555555555555,-26.25454545454545" stroke="white" stroke-width="2.7359999999999998" stroke-linecap="round" opacity="0.7"/>
  </g>

